<!DOCTYPE html>
<html>
<head>
  <title>Link Tracks to Siesta Records</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a1a;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      margin-bottom: 1rem;
    }
    button {
      background: #FF6B35;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 1rem;
    }
    button:hover {
      background: #e55a2b;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    #result {
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 8px;
      background: #333;
      display: none;
    }
    #result.success {
      background: #2d5a3d;
      display: block;
    }
    #result.error {
      background: #5a2d2d;
      display: block;
    }
    a {
      color: #FF6B35;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Link All Tracks to Siesta Records</h1>
    <p>This will link all 9 tracks and 6 artists to the Siesta Records label.</p>
    
    <button id="linkBtn" onclick="linkTracks()">
      Link All Tracks
    </button>
    
    <div id="result"></div>
    
    <p style="margin-top: 2rem;">
      <a href="https://music-download-store-2.vercel.app/labels/siesta-records" target="_blank">
        View Siesta Records Label Page →
      </a>
    </p>
  </div>

  <script>
    async function linkTracks() {
      const btn = document.getElementById('linkBtn');
      const result = document.getElementById('result');
      
      btn.disabled = true;
      btn.textContent = 'Linking...';
      
      try {
        const response = await fetch('/api/admin/link-all-tracks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await response.json();
        
        if (data.success) {
          result.className = 'success';
          result.innerHTML = `
            <h3>✅ Success!</h3>
            <p>Tracks found: ${data.tracksFound}</p>
            <p>Tracks updated: ${data.tracksUpdated}</p>
            <p>Artists updated: ${data.artistsUpdated}</p>
            <p><a href="https://music-download-store-2.vercel.app/labels/siesta-records" target="_blank">
              View Label Page →
            </a></p>
          `;
        } else {
          result.className = 'error';
          result.innerHTML = `
            <h3>❌ Error</h3>
            <p>${data.error}</p>
            <pre>${JSON.stringify(data.details, null, 2)}</pre>
          `;
        }
      } catch (error) {
        result.className = 'error';
        result.innerHTML = `<h3>❌ Error</h3><p>${error.message}</p>`;
      }
      
      btn.disabled = false;
      btn.textContent = 'Link All Tracks';
    }
  </script>
</body>
</html>
